name: Build Windows (.exe)

# Chạy khi bấm nút thủ công trong tab Actions, hoặc khi push lên nhánh main
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cài Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust (tăng tốc lần build sau)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cài thư viện frontend
        run: npm ci

      - name: Build app Windows
        env:
          # Key nhúng lấy từ GitHub Secrets (nếu có). Không đặt secret thì
          # app build ra sẽ yêu cầu người dùng tự nhập key — vẫn chạy bình thường.
          AUTOWRITE_EMBED_PROVIDER: ${{ secrets.AUTOWRITE_EMBED_PROVIDER }}
          AUTOWRITE_EMBED_KEY: ${{ secrets.AUTOWRITE_EMBED_KEY }}
        run: npm run tauri build

      - name: Đóng gói file cài đặt để tải về
        uses: actions/upload-artifact@v4
        with:
          name: Autowrite-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
